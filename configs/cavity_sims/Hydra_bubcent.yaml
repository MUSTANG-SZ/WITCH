# Base config to merge into
# If an absolute path is given then it is used
# Otherwise it is assumed to me reative to the directory of this file
base: "cavity_base.yaml"

# Cluster name
# Used both for the output path as well as to load presets
name: "Hydra_bubcent"
sim: True # If True use TODs to make noise and add a simulated cluster
model_map: True
noise_map: True

constants:
  z: 0.05

model:
  unit_conversion: "float(wu.get_da(constants['z'])*wu.y2K_RJ(constants['freq'], constants['Te'])*wu.XMpc/wu.me)"
  structures:
    a10:
      structure: "a10"
      parameters:
        dx_1:
          value: -20.0
        dy_1:
          value: -205.0
        dz_1:
          value: 0.0
        theta:
          value: 0.0
        P0:
          value: 3.202 
        c500:
          value: 1.083
        m500:
          value: "5.6e14"
          to_fit: False 
        gamma:
          value: 0.3798
          to_fit: False
        alpha:
          value: 1.4063
        beta:
          value: 5.4905
        z:
          value: 0.05
    bubbleA:
      structure: "uniform"
      parameters:
        dx:
          value: -3. #From Wise 2007
        dy:
          value: -188.
        dz:
          value: 0.
        r_1:
          value: 20.
        r_2:
          value: 12.
        r_3:
          value: 16.
        theta:
          value: eval("np.deg2rad(-130)")
        amp:
          value: -1.0
          to_fit: True
    bubbleB:
      structure: "uniform"
      parameters:
        dx:
          value: -37. #From Wise 2007
        dy:
          value: -222.
        dz:
          value: 0.
