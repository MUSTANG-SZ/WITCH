# Base config to merge into
# If an absolute path is given then it is used
# Otherwise it is assumed to me reative to the directory of this file
base: "MOOJ1142_base.yaml"

# Cluster name
# Used both for the output path as well as to load presets
name: "MOOJ1142"

paths:
  subdir: "xray_peak_A10"

coords:
  x0: "(175.69766238*u.deg).to(u.radian).value" # eleonora peak
  y0: "(15.45364413*u.deg).to(u.radian).value" #eleonora peak


cluster_model:
  structures:
    # Name of the first structure
    a10:
      structure: "a10" # What type of structure it is
      parameters:
        dx_1: # Name of the first parameter
          value: 0.0 # Value to use/start at, will be evaled
          to_fit: True
          priors: [-9.0, 9.0]
        dy_1:
          value: 0.0
          to_fit: True
          priors: [-9.0, 9.0]
        dz_1:
          value: 0.0
        theta:
          value: 0. 
        P0:
          value: 3.202
        c500:
          value: 1.083
        m500:
          value: "8.4e14"
          to_fit: True
        gamma:
          value: 0.3798
          to_fit: True 
        alpha:
          value: 1.4063
          to_fit: True
        beta:
          value: 5.4905
          to_fit: True
        z:
          value: 1.19
ps_model:
  structures:
    ps_gauss:
      structure: "gaussian"
      parameters:
        dx_g:
          value: 19.0
          to_fit: True
          priors: [10.0, 28.0]
        dy_g:
          value: -4.0
          to_fit: True
          priors: [-13.0, 5.0]
        sigma:
          value: 4.0
          to_fit: True
        amp_g:
          value: 0.01
          to_fit: True

datasets:
  mustang2:
    point_sources:
      - "ps_model"

metamodel:
  models:
    - cluster_model
    - ps_model
  model_map:
    mustang2:
      - cluster_model
      - ps_model
