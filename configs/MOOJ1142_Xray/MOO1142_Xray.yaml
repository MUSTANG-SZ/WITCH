# Base config to merge into
# If an absolute path is given then it is used
# Otherwise it is assumed to me reative to the directory of this file
base: "MOO1142_Xray_base.yaml" 

# Cluster name
# Used both for the output path as well as to load presets
name: "X_MOO1142"
sim: False # If True use TODs to make noise and add a simulated cluster

paths:
  subdir: "new_center"

# Define the model
model: # Unit conversion to apply at the end
  # Will be evaled
  unit_conversion: "float(1)"
  # Structure to include in the model
  structures:
    # Name of the first structure
    main:
      structure: "gnfw_rs" # What type of structure it is
      # Parameters for the structure
      parameters:
        dx_1:
          value: 0.0
        dy_1:
          value: 0.0
        dz_1:
          value: 0.0
        P0:
          value: 60
          to_fit: True
          priors: [100.0, 1000.0]
        r_s:
          value: 4.65
          to_fit: True
          priors: [1.0, 30.0]
        gamma:
          value: float(4.65)
          to_fit: False
          #priors: [0.1, 2.0] 
        alpha:
          value: 2.26
          to_fit: False
          #priors: [-9.0, 9.0]
        beta:
          value: 4.1
          to_fit: True
          priors: [1.0, 7.0]
        z:
          value: 1.19
    # Name of the first structure
    sub:
      structure: "sph_isobeta" # What type of structure it is
      # Parameters for the structure
      parameters:
        dx_2:
          value: 33.0
        dy_2:
          value: 7.0
        dz_2:
          value: 0.0
        r_1:
          value: 2
          to_fit: True
          priors: [10.0, 30.0]
        theta:
          value: 0.0
        beta:
          value: 2.56
          to_fit: True
          priors: [1.0, 6.0]
        amp:
          value: 20
          to_fit: True
          priors: [10.0, 300.0]

metamodel:
  models:
    - model 
  model_map:
    xray:
      - model 
