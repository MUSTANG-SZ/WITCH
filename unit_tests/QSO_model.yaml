#name: "HS1700" # Name of the cluster
base: "QSO_base.yaml"
name: "RXJ1347"
sim: True
noise_map: True # Whether to make the noise map
model_map: True # Whether to make a map of just the model

qso_model:
  structures:
    qso:
      # The first structure is witch.structures.a10
      structure: "qso"
      parameters:
        dx:
          value: 0.0
          to_fit: False
        dy:
          value: 0.0
          to_fit: False
        dz:
          value: 0.0
          to_fit: False
        z: 
          value: 2.735
          to_fit: False
        age:
          value: 1
          to_fit: False
        Lw12:
          value: "2.0e12"
          to_fit: True

metamodel:
  models:
    - qso_model
  model_map:
    mustang2:
      - qso_model


